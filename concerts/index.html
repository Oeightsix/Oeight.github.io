<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Concerts | Oeight</title>
  <meta name="description" content="演唱会档案 — 每一个现场夜晚。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body data-page="concerts" data-root="../">
  <div class="page-shell">
    <header class="site-header">
      <a class="brand" href="../index.html" aria-label="Homepage">
        <span class="brand-mark">O</span>
        <span class="brand-copy">
          <strong>Oeight</strong>
          <span data-i18n="brand.sub">个人档案</span>
        </span>
      </a>
      <button class="nav-toggle" type="button" aria-expanded="false" aria-label="Toggle navigation">
        <span></span><span></span>
      </button>
      <nav class="site-nav">
        <a href="../index.html" data-nav="home" data-i18n="nav.home">首页</a>
        <a href="./index.html" data-nav="concerts" data-i18n="nav.concerts">演唱会</a>
        <a href="../travel/index.html" data-nav="travel" data-i18n="nav.travel">足迹</a>
        <a href="../now/index.html" data-nav="now" data-i18n="nav.now">近况</a>
        <a href="../gallery/index.html" data-nav="gallery" data-i18n="nav.gallery">照片集</a>
      </nav>
    </header>

    <main>
      <section class="page-hero reveal">
        <p class="eyebrow" data-i18n="concerts.eyebrow">演唱会档案</p>
        <h1 data-i18n="concerts.title">每一个现场夜晚</h1>
        <p data-i18n="concerts.desc">城市、场馆与 Bilibili 录像，一一记录在档。</p>
      </section>

      <section class="filter-panel section-card reveal">
        <div class="filter-row">
          <label>
            <span data-i18n="concerts.filter.year">年份</span>
            <select id="concert-year-filter">
              <option value="all" data-i18n="concerts.filter.all">全部</option>
            </select>
          </label>
          <label>
            <span data-i18n="concerts.filter.artist">歌手</span>
            <select id="concert-artist-filter">
              <option value="all" data-i18n="concerts.filter.all">全部</option>
            </select>
          </label>
        </div>
      </section>

      <section id="concerts-grid" class="card-grid"></section>
    </main>

    <footer class="site-footer">
      <p>&copy; <span data-current-year></span> Oeight</p>
    </footer>
  </div>
  <script type="module" src="../assets/js/app.js"></script>
</body>
</html>
