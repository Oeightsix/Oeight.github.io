<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Oeight | Personal Archive</title>
  <meta name="description" content="Oeight 的个人档案站 — 演唱会、足迹、照片与日常碎片。">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/aaaakshat/cm-web-fonts@latest/fonts.css">
  <link rel="stylesheet" href="./assets/css/styles.css">
</head>
<body data-page="home" data-root="./">
  <div class="page-shell">
    <header class="site-header">
      <a class="brand" href="./index.html" aria-label="Homepage">
        <span class="brand-mark">O</span>
        <span class="brand-copy">
          <strong>Oeight</strong>
          <span data-i18n="brand.sub">个人档案</span>
        </span>
      </a>
      <button class="nav-toggle" type="button" aria-expanded="false" aria-label="Toggle navigation">
        <span></span><span></span>
      </button>
      <nav class="site-nav">
        <a href="./index.html" data-nav="home" data-i18n="nav.home">首页</a>
        <a href="./concerts/index.html" data-nav="concerts" data-i18n="nav.concerts">演唱会</a>
        <a href="./travel/index.html" data-nav="travel" data-i18n="nav.travel">足迹</a>
        <a href="./now/index.html" data-nav="now" data-i18n="nav.now">近况</a>
        <a href="./gallery/index.html" data-nav="gallery" data-i18n="nav.gallery">照片集</a>
      </nav>
    </header>

    <main class="home-main cm-home">
      <section class="cm-home-copy reveal" aria-labelledby="profile-name">
        <p class="cm-kicker" data-i18n="home.hero.eyebrow">个人档案</p>
        <h1 id="profile-name" class="home-display-name">Oeight</h1>
        <p id="profile-home-intro" class="home-copy-block">等待确认的首页简介。</p>

        <div class="link-row home-link-row" id="profile-links">
          <a class="pill-link" href="#">GitHub</a>
          <a class="pill-link" href="#">Bilibili</a>
          <a class="pill-link" href="#">Email</a>
        </div>

        <section class="cm-section" aria-labelledby="home-education-heading">
          <div class="cm-section-heading">
            <p class="cm-kicker" id="home-education-heading" data-i18n="home.education.label">教育背景</p>
            <h2>Education</h2>
          </div>
          <div class="home-education-grid cm-education-list" id="home-education-grid">
            <article class="home-education-card is-placeholder">
              <span class="home-education-period">TBD</span>
              <strong class="home-education-school">待确认教育信息</strong>
              <p class="home-education-meta">通过审核后会替换为正式内容。</p>
            </article>
          </div>
        </section>

        <nav class="cm-section-links" aria-label="Archive sections">
          <a href="./concerts/index.html" data-i18n="nav.concerts">演唱会</a>
          <a href="./travel/index.html" data-i18n="nav.travel">足迹</a>
          <a href="./now/index.html" data-i18n="nav.now">近况</a>
          <a href="./gallery/index.html" data-i18n="nav.gallery">照片集</a>
        </nav>
      </section>

      <figure class="cm-portrait-panel reveal">
        <img src="./08.png" alt="Oeight portrait" class="cm-portrait-image">
        <figcaption>Oeight / Personal Archive</figcaption>
      </figure>
    </main>

    <footer class="site-footer">
      <p>&copy; <span data-current-year></span> Oeight</p>
    </footer>
  </div>
  <script type="module" src="./assets/js/app.js"></script>
</body>
</html>
